# Shared recipe for all variants

modules:
  - type: dnf
    install:
      packages:
        - plasma-discover
        - gwenview
        - haruna
        - kcalc
        - qemu
        - libvirt
        - virt-manager
        - kontainer
        - docker
        - kclock
        - kcharselect
        - kcolorchooser
        - kamoso
        - kweather
        - kontact
        - firefox
        - firefoxpwa
      exclude:
        - plasma-discover-packagekit
        - plasma-discover-rpm-ostree
        - plasma-discover-snap
        - plasma-discover-offline-updates
        - plasma-discover-flatpak
    repos:
      files:
        - https://github.com/terrapkg/subatomic-repos/raw/main/terra.repo
        - firefoxpwa.repo

  - type: default-flatpaks
    configurations:
      - notify: true # Send notification after install/uninstall is finished (true/false)
        scope: system
        # If no repo information is specified, Flathub will be used by default
        install: # system flatpaks we want all users to have and not remove
          - org.libreoffice.LibreOffice
          - it.mijorus.gearlever
          - com.github.tchx84.Flatseal
          - io.github.flattool.Warehouse
          - net.davidotek.pupgui2
          - org.freedesktop.Platform.VulkanLayer.MangoHud//23.08
          - org.freedesktop.Platform.VulkanLayer.vkBasalt//23.08
          - org.freedesktop.Platform.VulkanLayer.OBSVkCapture//23.08
          - com.obsproject.Studio.Plugin.OBSVkCapture
          - com.obsproject.Studio.Plugin.Gstreamer
          - com.obsproject.Studio.Plugin.GStreamerVaapi
          - io.github.rfrench3.scopebuddy-gui
      - scope: user # Also add Flathub user repo, but no user packages
